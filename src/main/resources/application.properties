# Server Configuration
server.port=8080
server.servlet.context-path=/api

# H2 Database Configuration for Testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging Configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.selfstudy=DEBUG

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=UTC

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=105MB

# File Storage Configuration
file.upload-dir=uploads

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY:sk-your-api-key}
openai.api.model=gpt-3.5-turbo
openai.api.timeout=10
openai.api.max-tokens=500
openai.api.temperature=0.7

# AWS Configuration
aws.accessKey=${AWS_ACCESS_KEY:your-access-key}
aws.secretKey=${AWS_SECRET_KEY:your-secret-key}
aws.region=${AWS_REGION:us-east-1}

# Voice Narration Configuration
voice.narration.cache.max-size=100
voice.narration.cache.expire-after-write=24h
voice.narration.storage-dir=audio-files
voice.narration.default-voice=Joanna
